<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1220">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Híbrido 5AM">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Modo Híbrido 5AM</title>
<style>
:root{
  --bg:#0b1220; --bg2:#0e1626; --surface:#141f33; --surface2:#1b2840;
  --border:#26344f; --text:#eaf1ff; --text2:#90a0bd; --text3:#5e6f8f;
  --lime:#c2f94f; --lime-d:#9fd72f; --aqua:#4ec3c9; --blue:#5b8def;
  --orange:#ff9f45; --red:#ff6b6b; --green:#4ed98a; --purple:#a07cff;
  --z1:#9aa7bd; --z2:#5b8def; --z3:#4ed98a; --z4:#ff9f45; --z5:#ff6b6b;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0;}
html{height:100%; -webkit-text-size-adjust:100%; text-size-adjust:100%;}
body{
  height:100%;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased; line-height:1.45;
  padding-bottom:env(safe-area-inset-bottom);
  overscroll-behavior-y:contain; overflow-x:hidden;
}
button{touch-action:manipulation;}
.app{max-width:560px; margin:0 auto; min-height:100vh; position:relative;}
/* ---------- Header ---------- */
header{
  position:sticky; top:0; z-index:50;
  background:linear-gradient(180deg,rgba(11,18,32,0.98),rgba(11,18,32,0.92));
  backdrop-filter:blur(10px);
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  border-bottom:1px solid var(--border);
}
.hrow{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.logo{display:flex; align-items:center; gap:9px; font-weight:800; letter-spacing:.3px;}
.logo .mark{font-size:1.4rem;}
.logo b{color:var(--lime);}
.logo .sub{font-size:.62rem; color:var(--text2); font-weight:600; letter-spacing:1.5px; display:block; text-transform:uppercase;}
.streak{display:flex; align-items:center; gap:5px; background:var(--surface2); border:1px solid var(--border);
  padding:6px 11px; border-radius:30px; font-size:.8rem; font-weight:700;}
.streak .n{color:var(--lime);}
/* ---------- Tabs ---------- */
nav{
  position:fixed; bottom:0; left:0; right:0; z-index:60;
  background:rgba(14,22,38,0.97); backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:flex; max-width:560px; margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1; background:none; border:none; color:var(--text3);
  padding:9px 2px 8px; font-family:inherit; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:.6rem; font-weight:700; letter-spacing:.2px; transition:color .15s;
}
nav button .ic{font-size:1.25rem; line-height:1;}
nav button.active{color:var(--lime);}
/* ---------- Layout ---------- */
main{padding:16px 14px 96px;}
.view{display:none; animation:fade .25s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
h2.title{font-size:1.35rem; font-weight:800; margin-bottom:3px;}
.muted{color:var(--text2); font-size:.85rem;}
.section-h{font-size:.72rem; font-weight:800; letter-spacing:1.3px; text-transform:uppercase;
  color:var(--text2); margin:22px 2px 10px; display:flex; align-items:center; gap:7px;}
/* ---------- Cards ---------- */
.card{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:15px; margin-bottom:12px;}
.card.pad0{padding:0; overflow:hidden;}
.card-accent{border-left:3px solid var(--lime);}
.flat{background:var(--bg2); border:1px solid var(--border); border-radius:13px; padding:13px;}
.row{display:flex; align-items:center; gap:11px;}
.between{justify-content:space-between;}
.pill{font-size:.66rem; font-weight:800; padding:3px 9px; border-radius:20px; letter-spacing:.4px; text-transform:uppercase; white-space:nowrap;}
.pill.gym{background:rgba(91,141,239,.18); color:#8fb4ff;}
.pill.run{background:rgba(78,217,138,.16); color:var(--green);}
.pill.rest{background:rgba(154,167,189,.15); color:var(--text2);}
.pill.done{background:rgba(194,249,79,.18); color:var(--lime);}
.pill.late{background:rgba(255,107,107,.16); color:var(--red);}
/* buttons */
.btn{font-family:inherit; font-weight:700; border-radius:11px; border:none; cursor:pointer;
  padding:11px 15px; font-size:.85rem; display:inline-flex; align-items:center; justify-content:center; gap:7px; transition:filter .15s, transform .1s;}
.btn:active{transform:scale(.97);}
.btn-lime{background:var(--lime); color:#0b1220;}
.btn-ghost{background:var(--surface2); color:var(--text); border:1px solid var(--border);}
.btn-sm{padding:8px 12px; font-size:.78rem; border-radius:9px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.4; cursor:default;}
/* checkbox tap */
.chk{width:28px; height:28px; border-radius:8px; border:2px solid var(--border); background:var(--bg2);
  display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:all .15s; font-size:.9rem; color:#0b1220;}
.chk.on{background:var(--lime); border-color:var(--lime);}
.chk.on::after{content:'✓'; font-weight:900;}
/* progress */
.bar{height:9px; background:var(--bg2); border-radius:10px; overflow:hidden; border:1px solid var(--border);}
.bar > i{display:block; height:100%; background:linear-gradient(90deg,var(--lime-d),var(--lime)); border-radius:10px; transition:width .5s;}
.ring-wrap{display:flex; align-items:center; gap:16px;}
svg.ring{transform:rotate(-90deg);}
svg.ring circle{fill:none; stroke-width:9;}
svg.ring .bg{stroke:var(--bg2);}
svg.ring .fg{stroke:var(--lime); stroke-linecap:round; transition:stroke-dashoffset .6s;}
/* inputs */
input[type=number],input[type=date]{
  font-family:inherit; background:var(--bg2); border:1px solid var(--border); color:var(--text);
  border-radius:9px; padding:9px; font-size:1rem; font-weight:600; width:100%; text-align:center;}
input:focus{outline:none; border-color:var(--lime);}
label.fld{display:block; font-size:.72rem; color:var(--text2); font-weight:700; margin-bottom:5px; letter-spacing:.3px;}
/* exercise list */
.ex{padding:12px 0; border-bottom:1px solid var(--border);}
.ex:last-child{border-bottom:none;}
.ex .top{display:flex; gap:10px; align-items:flex-start;}
.ex .name{font-weight:700; font-size:.92rem;}
.ex .meta{font-size:.76rem; color:var(--text2); margin-top:2px;}
.ex .tags{display:flex; gap:6px; flex-wrap:wrap; margin-top:7px;}
.tag{font-size:.64rem; font-weight:700; padding:2px 7px; border-radius:6px; background:var(--surface2); color:var(--text2);}
.tag.tech{background:rgba(160,124,255,.15); color:#c4adff;}
.tag.rest{background:rgba(78,195,201,.14); color:var(--aqua);}
.loginp{display:flex; gap:6px; margin-top:9px; align-items:center;}
.loginp input{width:64px; padding:7px;}
.loginp span{font-size:.72rem; color:var(--text3);}
/* zones */
.zone{display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:10px; margin-bottom:7px; background:var(--bg2); border:1px solid var(--border);}
.zone .dot{width:13px; height:13px; border-radius:4px; flex-shrink:0;}
.zone .zn{font-weight:800; font-size:.85rem; min-width:26px;}
.zone .zd{font-size:.74rem; color:var(--text2); flex:1;}
.zone .bpm{font-weight:800; font-size:.82rem;}
/* run segments */
.seg{display:flex; align-items:center; gap:9px; padding:8px 0; border-bottom:1px dashed var(--border); font-size:.85rem;}
.seg:last-child{border:none;}
.seg .zbadge{font-weight:800; font-size:.72rem; padding:2px 8px; border-radius:6px; min-width:34px; text-align:center;}
.seg .st{flex:1;}
.seg .sd{font-weight:700; color:var(--text2); font-size:.8rem;}
/* water */
.water{display:flex; gap:7px; flex-wrap:wrap;}
.drop{width:38px; height:46px; border-radius:0 50% 50% 50%; transform:rotate(45deg); border:2px solid var(--border); cursor:pointer; transition:all .15s;}
.drop.on{background:var(--aqua); border-color:var(--aqua); box-shadow:0 0 12px rgba(78,195,201,.4);}
/* meal slot */
.slot{display:flex; align-items:center; gap:11px; padding:12px; border-radius:12px; background:var(--bg2); border:1px solid var(--border); margin-bottom:8px;}
.slot .si{font-size:1.5rem;}
.slot .sname{font-weight:700; font-size:.9rem;}
.slot .sdesc{font-size:.74rem; color:var(--text2);}
/* recipe */
.recipe{border:1px solid var(--border); border-radius:13px; margin-bottom:10px; overflow:hidden; background:var(--surface);}
.recipe .rh{padding:12px 14px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:10px;}
.recipe .rn{font-weight:700; font-size:.93rem;}
.recipe .rcal{font-size:.74rem; color:var(--lime); font-weight:700;}
.recipe .rbody{display:none; padding:0 14px 14px; border-top:1px solid var(--border); font-size:.83rem;}
.recipe.open .rbody{display:block;}
.macros{display:flex; gap:8px; margin:11px 0;}
.macro{flex:1; text-align:center; background:var(--bg2); border-radius:9px; padding:7px 4px; border:1px solid var(--border);}
.macro b{display:block; font-size:1rem; color:var(--text);}
.macro span{font-size:.62rem; color:var(--text2); text-transform:uppercase; letter-spacing:.4px;}
.recipe ul{margin:7px 0 0 17px; color:var(--text2);}
.recipe ul li{margin-bottom:3px;}
.recipe .prep{margin-top:10px; color:var(--text2); line-height:1.5;}
/* measure table */
.mtable{width:100%; border-collapse:collapse; font-size:.85rem;}
.mtable th{font-size:.66rem; text-transform:uppercase; color:var(--text2); letter-spacing:.5px; text-align:right; padding:7px 6px; border-bottom:1px solid var(--border); font-weight:700;}
.mtable th:first-child{text-align:left;}
.mtable td{padding:9px 6px; border-bottom:1px solid var(--border); text-align:right;}
.mtable td:first-child{text-align:left; font-weight:600;}
.delta{font-weight:800; font-size:.8rem;}
.delta.good{color:var(--green);} .delta.bad{color:var(--red);} .delta.neu{color:var(--text3);}
/* misc */
.kicker{font-size:.78rem; color:var(--lime); font-weight:800; letter-spacing:.4px; text-transform:uppercase; margin-bottom:5px;}
.big{font-size:2.6rem; font-weight:800; line-height:1;}
.notice{background:rgba(255,159,69,.1); border:1px solid rgba(255,159,69,.3); color:#ffce9b; border-radius:11px; padding:11px 13px; font-size:.8rem;}
.toast{position:fixed; bottom:84px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--lime); color:#0b1220;
  padding:11px 22px; border-radius:30px; font-weight:700; font-size:.85rem; opacity:0; transition:all .35s; z-index:200; box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
.collapse-h{cursor:pointer; display:flex; align-items:center; justify-content:space-between;}
.chev{transition:transform .2s; color:var(--text3);}
.collapsed .chev{transform:rotate(-90deg);}
.timerbtn{display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); color:var(--aqua); border-radius:8px; padding:6px 10px; font-size:.74rem; font-weight:700; cursor:pointer; font-family:inherit;}
.daychip{display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 4px; border-radius:11px; background:var(--bg2); border:1px solid var(--border); cursor:pointer; flex:1; min-width:0;}
.daychip.today{border-color:var(--lime); background:rgba(194,249,79,.07);}
.daychip .dn{font-size:.62rem; color:var(--text2); font-weight:700;}
.daychip .dl{font-size:.72rem; font-weight:800;}
.daychip .dd{font-size:.95rem;}
.affirm{background:linear-gradient(135deg,rgba(194,249,79,.12),rgba(78,195,201,.08)); border:1px solid rgba(194,249,79,.25);
  border-radius:14px; padding:15px; font-weight:700; font-size:.96rem; font-style:italic;}
hr.sep{border:none; border-top:1px solid var(--border); margin:14px 0;}
.empty{text-align:center; padding:30px 18px; color:var(--text2);}
.empty .e-ic{font-size:2.4rem; margin-bottom:8px;}
/* ---------- Run guide player ---------- */
.player{position:fixed; inset:0; z-index:300; background:rgba(8,13,24,0.975); backdrop-filter:blur(10px); display:flex; justify-content:center;}
.player-inner{max-width:560px; width:100%; display:flex; flex-direction:column; border-top:4px solid var(--lime);
  padding:calc(env(safe-area-inset-top) + 16px) 20px calc(env(safe-area-inset-bottom) + 18px);}
.player-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.player-mid{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:15px;}
.player-counter{font-size:.92rem; font-weight:700; color:var(--text2); letter-spacing:.6px; text-transform:uppercase;}
.player-phaselabel{font-size:2.05rem; font-weight:800; line-height:1.05;}
.player-timer{font-size:5rem; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; letter-spacing:1px;}
.player-bpm{font-size:1.25rem; font-weight:800; padding:9px 20px; border-radius:30px;}
.player-instr{font-size:.96rem; color:var(--text2); max-width:380px; line-height:1.5;}
.player-bar{width:100%; max-width:380px; height:11px; background:var(--bg2); border-radius:10px; overflow:hidden; border:1px solid var(--border);}
.player-bar > i{display:block; height:100%; width:100%; border-radius:10px; transition:width .25s linear;}
.player-next{text-align:center; font-size:.85rem; color:var(--text2); padding:13px 0; font-weight:600;}
.player-controls{display:flex; gap:10px;}
.player-controls button{flex:1; padding:15px 8px; font-size:1rem;}
details.awtip summary{cursor:pointer; font-size:.8rem; color:var(--aqua); font-weight:700; padding:4px 0; list-style:none;}
details.awtip summary::-webkit-details-marker{display:none;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="hrow">
      <div class="logo">
        <span class="mark">🐊</span>
        <div>MODO <b>HÍBRIDO</b> 5AM
          <span class="sub">Desafío Atleta Híbrido · Andres</span>
        </div>
      </div>
      <div class="streak" id="streakBox" title="Días seguidos cumpliendo">🔥 <span class="n" id="streakN">0</span></div>
    </div>
  </header>

  <main>
    <!-- ============ HOY ============ -->
    <section class="view active" id="v-hoy"></section>
    <!-- ============ SEMANA ============ -->
    <section class="view" id="v-semana"></section>
    <!-- ============ GYM ============ -->
    <section class="view" id="v-gym"></section>
    <!-- ============ COMIDA ============ -->
    <section class="view" id="v-comida"></section>
    <!-- ============ MEDIDAS ============ -->
    <section class="view" id="v-medidas"></section>
    <!-- ============ TOOLS ============ -->
    <section class="view" id="v-tools"></section>
  </main>

  <nav>
    <button data-v="hoy" class="active"><span class="ic">🏠</span>Hoy</button>
    <button data-v="semana"><span class="ic">📅</span>Semana</button>
    <button data-v="gym"><span class="ic">🏋️</span>Gym</button>
    <button data-v="comida"><span class="ic">🍽️</span>Comida</button>
    <button data-v="medidas"><span class="ic">📏</span>Medidas</button>
    <button data-v="tools"><span class="ic">🧮</span>Tools</button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
/* =================================================================
   MODO HÍBRIDO 5AM — App personal de Andres
   Datos extraídos de: "modo híbrido 5AM", "time-hibrido", "guia nutricional" (Victor Pareto / Time Híbrido)
   + baseline corporal real (27-mar-2026, 74 kg)
   ================================================================= */

/* ---------- PERFIL ---------- */
const PERFIL = { edad:33, fcmax:185 }; // Tanaka: 208 - 0.7*33 = 184.9 ≈ 185

/* ---------- ZONAS FC (% del plan de corrida del PDF) ---------- */
const ZONAS = [
  {z:'Z1', pct:[50,59], color:'var(--z1)', label:'Recuperación · muy leve', desc:'Respiración tranquila, conversas normal'},
  {z:'Z2', pct:[60,69], color:'var(--z2)', label:'Aeróbica · leve', desc:'Respiración un poco más alta, aún conversas'},
  {z:'Z3', pct:[70,79], color:'var(--z3)', label:'Umbral · moderado', desc:'Respiración acelerada, conversas con dificultad'},
  {z:'Z4', pct:[80,89], color:'var(--z4)', label:'Anaeróbica · pesado', desc:'Jadeo, casi imposible conversar'},
  {z:'Z5', pct:[90,95], color:'var(--z5)', label:'Máxima · severo', desc:'Jadeo total, insostenible'},
];
function bpm(p){ return Math.round(PERFIL.fcmax * p/100); }

/* ---------- CORRIDA (planilla 5KM Iniciante Nível 3) ---------- */
const RUNS = {
  R1:{ name:'Intervalado 1:1 — Moderado', tot:'~40 min', desc:'Calienta, alterna esfuerzo/descanso 15 veces, enfría.',
    segs:[
      {z:'Z1', t:'5 min', x:'1x', note:'Calentamiento'},
      {z:'Z3', t:'1 min', x:'15x', note:'Esfuerzo (alterna con Z1 1 min)'},
      {z:'Z1', t:'1 min', x:'15x', note:'Trote suave entre esfuerzos'},
      {z:'Z1', t:'5 min', x:'1x', note:'Vuelta a la calma'},
    ]},
  R2:{ name:'Intervalado 2:2 — Vigoroso', tot:'~34 min', desc:'Bloques fuertes de 2 min en Z4 con 2 min de recuperación.',
    segs:[
      {z:'Z1', t:'5 min', x:'1x', note:'Calentamiento'},
      {z:'Z4', t:'2 min', x:'6x', note:'Esfuerzo fuerte (alterna con Z1 2 min)'},
      {z:'Z1', t:'2 min', x:'6x', note:'Recuperación entre bloques'},
      {z:'Z1', t:'5 min', x:'1x', note:'Vuelta a la calma'},
    ]},
  R3:{ name:'Continuo 25 min — Moderado', tot:'~35 min', desc:'Trote sostenido y constante en Z3.',
    segs:[
      {z:'Z1', t:'5 min', x:'1x', note:'Calentamiento'},
      {z:'Z3', t:'25 min', x:'1x', note:'Ritmo continuo moderado'},
      {z:'Z1', t:'5 min', x:'1x', note:'Vuelta a la calma'},
    ]},
};

/* ---------- MUSCULAÇÃO (Treinos A-E, Academia 5x semana) ---------- */
const TREINOS = {
  A:{ name:'Treino A', focus:'Pecho · Hombro · Tríceps', color:'var(--blue)',
    ex:[
      {n:'Calentamiento / movilidad superiores', s:'Bloque 1', tech:'Aquecimiento', rest:'1 min', log:false},
      {n:'Press plano con mancuernas', s:'4 × 15', tech:'Pirámide', rest:'90 seg', log:true},
      {n:'Cruce inclinado + Press inclinado (mancuernas)', s:'4 × 15 + 15', tech:'Bi-set', rest:'90 seg', log:true},
      {n:'Peck deck + Flexiones a la falla (punto cero)', s:'4 × 15 + falla', tech:'Bi-set', rest:'90 seg', log:true},
      {n:'Desarrollo (press militar) con mancuernas', s:'4 × 15-12-10-8', tech:'Pirámide', rest:'1-3 min', log:true},
      {n:'Tríceps frente (testa) con mancuernas', s:'4 × 15', tech:'Meta rep', rest:'90 seg', log:true},
      {n:'Tríceps patada + Tríceps con cuerda', s:'4 × 15 + 15', tech:'Bi-set', rest:'90 seg', log:true},
    ]},
  B:{ name:'Treino B', focus:'Piernas (miembros inferiores)', color:'var(--orange)',
    ex:[
      {n:'Flexibilidad/movilidad + Sentadilla peso corporal', s:'3 × 15', tech:'Aquecimiento', rest:'45 seg', log:false},
      {n:'Peso muerto (Terra / Deadlift)', s:'4 × 15-12-10-8-6', tech:'Pirámide', rest:'1-3 min', log:true},
      {n:'Mesa flexora (femoral)', s:'4 × 6 / 12', tech:'6 pesado · 12 ligero', rest:'2 min', log:true},
      {n:'Stiff con barra o mancuernas', s:'4 × 20-15-12-10-8', tech:'Pirámide', rest:'1-3 min', log:true},
      {n:'Leg press 45°', s:'4 × 15', tech:'Meta rep', rest:'2 min', log:true},
      {n:'Sentadilla libre + Silla china (a la falla)', s:'4 × 15 + falla', tech:'Bi-set', rest:'3 min', log:true},
      {n:'Abductora + Pantorrilla de pie', s:'4 × 20 + 20', tech:'Meta rep', rest:'2 min', log:true},
    ]},
  C:{ name:'Treino C', focus:'Espalda · Bíceps', color:'var(--green)',
    ex:[
      {n:'Calentamiento / movilidad superiores', s:'Bloque 1', tech:'Aquecimiento', rest:'1 min', log:false},
      {n:'Remo inclinado con barra', s:'4 × 15-12-10-8', tech:'Pirámide', rest:'1-3 min', log:true},
      {n:'Dominadas / Barra libre — 40 reps totales', s:'40 reps', tech:'Meta rep (si <6, usar gravitón)', rest:'90 seg', log:true},
      {n:'Jalón al pecho + Remo con mancuernas', s:'4 × 15 + 15', tech:'Bi-set', rest:'2 min', log:true},
      {n:'Serrucho (remo unilateral) con mancuerna', s:'4 × 15', tech:'Meta rep', rest:'1 min', log:true},
      {n:'Posterior de hombro en polea', s:'4 × 15', tech:'Pirámide', rest:'2 min', log:true},
      {n:'Curl bíceps + Encogimiento (trapecio) mancuernas', s:'4 × 15 + 15', tech:'Bi-set', rest:'2 min', log:true},
    ]},
  D:{ name:'Treino D', focus:'Hombros · Abdomen', color:'var(--purple)',

/* =================================================================
   STATE / STORAGE
   ================================================================= */
const KEY='hibrido_v1';
const todayISO = ()=> new Date().toISOString().slice(0,10);
function load(){
  let s; try{ s=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
  if(!s) s={};
  s.startDate = s.startDate || null;
  s.sessions = s.sessions || {}; // id -> {done, day}
  s.gymlog = s.gymlog || {};     // "TREINO_exIndex_set" -> {w,r}
  s.habits = s.habits || {};     // ISO -> {cafe,pre,pos,janta,water,am:[],pm:[]}
  s.measures = s.measures || [];
  s.frase = s.frase || {};       // ISO -> idx
  // init sessions
  SESSIONS.forEach(se=>{ if(!s.sessions[se.id]) s.sessions[se.id]={done:false, day:se.dayDef}; });
  return s;
}
let S = load();
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }

function habit(iso){
  if(!S.habits[iso]) S.habits[iso]={cafe:false,pre:false,pos:false,janta:false,water:0,am:[],pm:[]};
  return S.habits[iso];
}
// Día actual del desafío (1-7) según startDate; null si no inició
function currentDay(){
  if(!S.startDate) return null;
  const d0 = new Date(S.startDate+'T00:00:00');
  const dn = new Date(todayISO()+'T00:00:00');
  const diff = Math.floor((dn-d0)/86400000)+1;
  return diff;
}
function clampDay(d){ return Math.max(1,Math.min(7,d)); }

function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1700);
}
function zColor(z){ return ZONAS.find(x=>x.z===z).color; }
function zPctLabel(z){ const zz=ZONAS.find(x=>x.z===z); return zz.pct[0]+'-'+zz.pct[1]+'%'; }
function zBpm(z){ const zz=ZONAS.find(x=>x.z===z); return bpm(zz.pct[0])+'-'+bpm(zz.pct[1])+' bpm'; }

/* recompute streak: días consecutivos (hasta ayer/hoy) con al menos su sesión hecha o hábitos */
function computeStreak(){
  // cuenta días seguidos terminando hoy donde se completó la sesión asignada (o, en días sin sesión, ≥3 hábitos)
  let streak=0;
  for(let back=0; back<60; back++){
    const dt=new Date(); dt.setDate(dt.getDate()-back);
    const iso=dt.toISOString().slice(0,10);
    const h=S.habits[iso];
    const did = h && (h.cafe||h.pre||h.pos||h.janta||h.water>0||(h.am&&h.am.length)||(h.pm&&h.pm.length));
    if(did) streak++;
    else { if(back===0) continue; break; }
  }
  return streak;
}

  });

  if(late.length){
    html += `<div class="section-h" style="color:var(--red)">⏰ Pendiente de días anteriores</div>`;
    late.forEach(se=> html += sessionCard(se, cd, true));
  }

  // ENTRENO DE HOY
  html += `<div class="section-h">🏋️ Entreno de hoy</div>`;
  if(todays.length===0 && cd!==7){
    // ¿ya hechas?
    const planned = SESSIONS.filter(se=> se.dayDef===cd || S.sessions[se.id].day===cd);
    if(planned.length) html += `<div class="card" style="text-align:center"><div style="font-size:1.6rem">✅</div><div style="font-weight:700;margin-top:5px">¡Entreno de hoy completo!</div><div class="muted">Sigue con la nutrición y la hidratación.</div></div>`;

  html += `<div class="section-h">🍽️ Comidas de hoy</div><div class="card pad0" style="padding:13px">`;

  const cups=8;

  for(let i=1;i<=cups;i++) html += `<div class="drop ${i<=h.water?'on':''}" onclick="setWater(${i})"></div>`;
  html += `</div></div>`;

  // RITUAL NOCHE
  html += `<div class="section-h">🌙 Checklist nocturno (preparar el 5AM)</div><div class="card">`;
  RITUAL_PM.forEach((r,i)=>{
    const on = h.pm.includes(i);

  });

  el.innerHTML=html;

/* ring svg */
function ringSVG(pct, size){
  const r=(size-9)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="bg" cx="${size/2}" cy="${size/2}" r="${r}"></circle>
    <circle class="fg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}"></circle>
    <text x="50%" y="50%" transform="rotate(90 ${size/2} ${size/2})" text-anchor="middle" dy="0.35em" fill="var(--text)" font-size="${size*0.26}" font-weight="800">${pct}%</text></svg>`;
}
function weekPct(){ const d=SESSIONS.filter(se=>S.sessions[se.id].done).length; return Math.round(d/SESSIONS.length*100); }

/* =================================================================
   GUÍA DE CORRIDA — interval player (BPM + Apple Watch)
   ================================================================= */
function fmtSecs(s){ const m=Math.floor(s/60), ss=s%60; return m+':'+String(ss).padStart(2,'0'); }
function expandRun(id){
  const ph=[]; const add=(label,zone,secs,kind,idx,total)=>ph.push({label,zone,secs,kind,idx,total});
  if(id==='R1'){
    add('Calentamiento','Z1',300,'warm');
    for(let i=1;i<=15;i++){ add('Esfuerzo','Z3',60,'effort',i,15); add('Trote suave','Z1',60,'recover',i,15); }
    add('Enfriamiento','Z1',300,'cool');
  } else if(id==='R2'){
    add('Calentamiento','Z1',300,'warm');
    for(let i=1;i<=6;i++){ add('Esfuerzo fuerte','Z4',120,'effort',i,6); add('Recuperación','Z1',120,'recover',i,6); }
    add('Enfriamiento','Z1',300,'cool');
  } else {
    add('Calentamiento','Z1',300,'warm');
    add('Ritmo continuo','Z3',1500,'cont');
    add('Enfriamiento','Z1',300,'cool');
  }
  return ph;
}
function appleWatchTipHTML(){
  return `<div class="flat" style="font-size:.81rem;line-height:1.55">
    <b style="color:var(--text)">📱 Cómo medirlo con tu Apple Watch</b><br>
    Las zonas son <b style="color:var(--lime)">pulso (bpm), no velocidad</b>: corré más rápido o más lento hasta que el reloj marque el rango.<br><br>
    1. App <b>Entrenamiento</b> → <b>Correr al aire libre</b>.<br>
    2. Deslizá a la pantalla de <b>Frecuencia cardíaca</b> → mirá el número de bpm.<br>
    3. Mantené ese número dentro del rango de la zona que toca.<br><br>
    <b>Test del habla (sin mirar):</b> Z3 = hablás entrecortado · Z4 = casi no podés hablar.<br>
    <b>Ojo:</b> en los esfuerzos de 1 min el pulso sube con retraso → guiate también por el esfuerzo, no esperés el número exacto.</div>`;
}
const RunPlayer = {
  id:null, phases:[], i:0, endAt:0, paused:false, remain:0, int:null, audioCtx:null, wakeLock:null,
  open(id){
    this.id=id; this.phases=expandRun(id); this.i=0; this.paused=false;
    try{ this.audioCtx=this.audioCtx||new (window.AudioContext||window.webkitAudioContext)(); this.audioCtx.resume(); }catch(e){}
    try{ if(navigator.wakeLock) navigator.wakeLock.request('screen').then(w=>this.wakeLock=w).catch(()=>{}); }catch(e){}
    document.getElementById('runPlayer').style.display='flex';
    this.startPhase();
  },
  startPhase(){
    const p=this.phases[this.i];
    this.endAt=Date.now()+p.secs*1000; this.paused=false;
    this.render(); this.beep(p.kind);
    clearInterval(this.int); this.int=setInterval(()=>this.tick(),250);
  },
  tick(){
    if(this.paused) return;
    const ms=this.endAt-Date.now(); const left=Math.max(0,Math.round(ms/1000));
    this.updateTimer(left);
    if(ms<=0){ clearInterval(this.int); this.advance(); }
  },
  advance(){ if(this.i>=this.phases.length-1){ this.finish(); return; } this.i++; this.startPhase(); },
  skip(){ clearInterval(this.int); this.advance(); },
  prev(){ if(this.i>0) this.i--; clearInterval(this.int); this.startPhase(); },
  pause(){
    const b=document.getElementById('pPause');
    if(this.paused){ this.endAt=Date.now()+this.remain*1000; this.paused=false; if(b)b.textContent='⏸ Pausar'; clearInterval(this.int); this.int=setInterval(()=>this.tick(),250); }
    else { this.remain=Math.max(0,Math.round((this.endAt-Date.now())/1000)); this.paused=true; if(b)b.textContent='▶ Seguir'; clearInterval(this.int); }
  },
  instr(p){
    const b=zBpm(p.zone);
    if(p.kind==='warm') return 'Trote muy suave. Soltá el cuerpo, no fuerces el pulso.';
    if(p.kind==='cool') return 'Trote muy suave para enfriar. Dejá caer las pulsaciones.';
    if(p.kind==='recover') return 'Bajá a trote suave o caminá. Recuperá, dejá caer el pulso.';
    if(p.kind==='cont') return `Ritmo sostenido y constante. Mantené el pulso en ${b} todo el bloque (hablás entrecortado).`;
    if(p.kind==='effort' && p.zone==='Z4') return `Ritmo FUERTE. Llevá el pulso a ${b}: jadeo, casi sin poder hablar.`;
    if(p.kind==='effort') return `Subí el ritmo. Llevá el pulso a ${b} (mirá el reloj). Hablás solo a frases cortas.`;
    return '';
  },
  render(){
    const p=this.phases[this.i], col=zColor(p.zone), next=this.phases[this.i+1];
    const counter=(p.kind==='effort'||p.kind==='recover')?`<div class="player-counter">Intervalo ${p.idx} de ${p.total}</div>`:'';
    const nextTxt = next? `Sigue: ${next.label} · ${next.zone} ${zBpm(next.zone)} · ${fmtSecs(next.secs)}` : 'Última fase — ¡a cerrar fuerte!';
    document.getElementById('runPlayer').innerHTML=`<div class="player-inner" style="border-color:${col}">
      <div class="player-top"><button class="btn btn-ghost btn-sm" onclick="RunPlayer.exit()">✕ Salir</button>
        <span class="muted" style="font-size:.78rem">${RUNS[this.id].name} · fase ${this.i+1}/${this.phases.length}</span></div>
      <div class="player-mid">
        ${counter}
        <div class="player-phaselabel" style="color:${col}">${p.label}</div>
        <div class="player-timer" id="pTimer">${fmtSecs(p.secs)}</div>
        <div class="player-bpm" style="background:${col}1f;color:${col};border:1px solid ${col}66">🎯 ${p.zone} · ${zBpm(p.zone)}</div>
        <div class="player-instr">${this.instr(p)}</div>
        <div class="player-bar"><i id="pBar" style="background:${col};width:100%"></i></div>
      </div>
      <div class="player-next">${nextTxt}</div>
      <div class="player-controls">
        <button class="btn btn-ghost" onclick="RunPlayer.prev()">⏮ Atrás</button>
        <button class="btn btn-lime" id="pPause" onclick="RunPlayer.pause()">⏸ Pausar</button>
        <button class="btn btn-ghost" onclick="RunPlayer.skip()">Saltar ⏭</button>
      </div></div>`;
  },
  updateTimer(left){
    const p=this.phases[this.i];
    const t=document.getElementById('pTimer'); if(t)t.textContent=fmtSecs(left);
    const bar=document.getElementById('pBar'); if(bar)bar.style.width=(left/p.secs*100)+'%';
  },
  finish(){
    clearInterval(this.int); this.beep('done');
    try{ if(this.wakeLock){ this.wakeLock.release(); this.wakeLock=null; } }catch(e){}
    document.getElementById('runPlayer').innerHTML=`<div class="player-inner" style="border-color:var(--lime);justify-content:center;text-align:center;align-items:center">
      <div style="font-size:3.2rem">🏁</div>
      <div style="font-size:1.5rem;font-weight:800;margin:10px 0 4px">¡Corrida completada!</div>
      <div class="muted" style="margin-bottom:22px">${RUNS[this.id].name}</div>
      <button class="btn btn-lime btn-block" onclick="completeSession('${this.id}');RunPlayer.exit()">✓ Marcar como hecha</button>
      <button class="btn btn-ghost btn-block" style="margin-top:9px" onclick="RunPlayer.exit()">Cerrar sin marcar</button></div>`;
  },
  exit(){ clearInterval(this.int); this.paused=false; try{ if(this.wakeLock){ this.wakeLock.release(); this.wakeLock=null; } }catch(e){} document.getElementById('runPlayer').style.display='none'; },
  beep(kind){
    try{ const a=this.audioCtx; if(a){ const seq = kind==='effort'?[[880,0.15],[1180,0.2]] : kind==='done'?[[660,0.15],[880,0.15],[1245,0.3]] : [[523,0.22]];
      let t=a.currentTime+0.01; seq.forEach(p=>{ const o=a.createOscillator(),g=a.createGain(); o.type='sine'; o.frequency.value=p[0]; o.connect(g); g.connect(a.destination);
        g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.5,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+p[1]); o.start(t); o.stop(t+p[1]+0.03); t+=p[1]+0.06; }); } }catch(e){}
    if(navigator.vibrate){ navigator.vibrate(kind==='effort'?[180,70,180]:kind==='done'?[250,100,250,100,250]:220); }
  }
};
(function(){ const d=document.createElement('div'); d.id='runPlayer'; d.className='player'; d.style.display='none'; document.body.appendChild(d); })();

        </div>`;
      });

    html += `</div>`;
  });

    <table class="mtable" style="min-width:420px"><thead><tr><th>Día</th><th>☀️</th><th>⚡</th><th>💪</th><th>🌙</th><th>💧</th><th>Ritual</th></tr></thead><tbody>`;
  for(let d=1; d<=7; d++){
    const iso = isoForDay(d);
    const h = iso?S.habits[iso]:null;
    const cell=(v)=> v?'<span style="color:var(--lime)">✓</span>':'<span style="color:var(--text3)">·</span>';
    const rit = h?((h.am?.length||0)+(h.pm?.length||0)):0;
    html += `<tr><td>Día ${d}${cd===d?' •':''}</td><td>${h?cell(h.cafe):'·'}</td><td>${h?cell(h.pre):'·'}</td><td>${h?cell(h.pos):'·'}</td><td>${h?cell(h.janta):'·'}</td><td>${h?h.water+'v':'·'}</td><td>${rit}/11</td></tr>`;
  }
  html += `</tbody></table></div>`;

  if(cd&&cd>=1){
    html += `<button class="btn btn-ghost btn-block" style="margin-top:6px" onclick="newWeek()">🔄 Reiniciar semana</button>`;
  }
  el.innerHTML=html;
}
function isoForDay(d){
  if(!S.startDate) return null;
  const d0=new Date(S.startDate+'T00:00:00'); d0.setDate(d0.getDate()+(d-1));
  return d0.toISOString().slice(0,10);
}

let restInt=null;
function startRest(restStr){
  // toma el mayor número de segundos del string (ej "90 seg" -> 90, "1-3 min" -> 180, "2 min" ->120)
  let secs=90;
  if(/seg/.test(restStr)){ secs=parseInt(restStr); }
  else if(/min/.test(restStr)){ const nums=restStr.match(/\d+/g).map(Number); secs=Math.max(...nums)*60; }
  let left=secs;
  const box=document.getElementById('restTimer'); if(!box) return;
  box.style.display='block';
  clearInterval(restInt);
  const tick=()=>{ const m=Math.floor(left/60), s=left%60; box.textContent=`⏱ ${m}:${String(s).padStart(2,'0')}`;
    if(left<=0){ clearInterval(restInt); box.textContent='✓ ¡A la serie!'; if(navigator.vibrate)navigator.vibrate(400); setTimeout(()=>box.style.display='none',2500); } left--; };
  tick(); restInt=setInterval(tick,1000);
}

  {k:'abdomen', ic:'🎯', label:'Abdomen', unit:'cm', rev:true, target:80},
  {k:'gluteo', ic:'🍑', label:'Glúteo', unit:'cm', rev:false, target:101},
  {k:'muslo_r', ic:'🦵', label:'Pierna D', unit:'cm', rev:false, target:58},
  {k:'muslo_l', ic:'🦵', label:'Pierna I', unit:'cm', rev:false, target:58},
  {k:'panto_r', ic:'🦶', label:'Pantor. D', unit:'cm', rev:false, target:40},
  {k:'panto_l', ic:'🦶', label:'Pantor. I', unit:'cm', rev:false, target:40},
];
function renderMedidas(){
  const el=document.getElementById('v-medidas');
  const hist=S.measures.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const baseline = hist.length ? hist[0] : null;
  const latest = hist.length ? hist[hist.length-1] : null;
  const prev = hist.length>1 ? hist[hist.length-2] : null;

  const introTxt = baseline
    ? `Base: <b>${fmtDate(baseline.date)}${baseline.m.peso?' · '+baseline.m.peso+' kg':''}</b>. Mídete en ayunas, misma hora. Compará cada 7 días.`
    : `Tomá tus medidas <b>hoy</b> para fijar tu base (Día 1). Mídete en ayunas. Después compará cada 7 días.`;
  let html=`<h2 class="title">Mis medidas</h2><p class="muted">${introTxt}</p>`;

  // comparación última vs anterior (gap real en días)
  let gapTxt='vs. medición anterior';
  if(hist.length>=2){ const g=Math.round((new Date(latest.date)-new Date(prev.date))/86400000); gapTxt=`últimos ${g} días`; }
  html+=`<div class="section-h">Cambio (${gapTxt})</div>`;
  if(hist.length<2){
    html+=`<div class="card"><div class="empty"><div class="e-ic">📊</div>Agrega una nueva medición para ver tu diferencia de 7 días.</div></div>`;
  } else {
    html+=`<div class="card pad0" style="padding:13px"><table class="mtable"><thead><tr>
      <th>Medida</th><th>${fmtDate(prev.date)}</th><th>${fmtDate(latest.date)}</th><th>Δ</th></tr></thead><tbody>`;
    METRICS.forEach(mt=>{
      const a=prev.m[mt.k], b=latest.m[mt.k];
      if(a==null&&b==null) return;
      let d='', cls='neu';
      if(a!=null&&b!=null){ const diff=+(b-a).toFixed(1);
        if(diff===0){d='0'; cls='neu';}
        else{ const good = mt.rev===null ? null : (mt.rev? diff<0 : diff>0);
          cls = good===null?'neu':(good?'good':'bad'); d=(diff>0?'+':'')+diff; }
      }
      html+=`<tr><td>${mt.ic} ${mt.label}</td><td>${a??'—'}</td><td>${b??'—'}</td><td class="delta ${cls}">${d||'—'}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  // progreso hacia metas
  html+=`<div class="section-h">Progreso hacia tus metas</div>`;
  if(!baseline){
    html+=`<div class="card"><div class="muted" style="font-size:.85rem">Registrá tu primera medición abajo para fijar tu base y empezar a ver el progreso hacia tus metas. 💪</div></div>`;
  } else {
    html+=`<div class="card">`;
    METRICS.filter(m=>m.target!=null).forEach(mt=>{
      const start=baseline.m[mt.k]; if(start==null) return;
      const cur=latest.m[mt.k]??start, tgt=mt.target;
      const span=tgt-start; const pct = span===0?100:Math.max(0,Math.min(100,Math.round((cur-start)/span*100)));
      html+=`<div style="margin-bottom:12px"><div class="row between" style="font-size:.8rem;margin-bottom:5px">
        <span>${mt.ic} ${mt.label}</span><span class="muted">${cur??'—'} → <b style="color:var(--lime)">${tgt}</b> ${mt.unit}</span></div>
        <div class="bar"><i style="width:${pct}%"></i></div></div>`;
    });
    html+=`</div>`;
  }

  // nueva medición
  html+=`<div class="section-h">Registrar nueva medición</div><div class="card">
    <label class="fld">Fecha</label><input type="date" id="mDate" value="${todayISO()}" style="margin-bottom:12px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`;
  METRICS.forEach(mt=>{
    const last=(latest&&latest.m[mt.k]!=null)?latest.m[mt.k]:'';
    html+=`<div><label class="fld">${mt.ic} ${mt.label} (${mt.unit})</label>
      <input type="number" inputmode="decimal" step="0.1" id="m_${mt.k}" placeholder="${last||'—'}"></div>`;
  });
  html+=`</div><button class="btn btn-lime btn-block" style="margin-top:14px" onclick="saveMeasure()">💾 Guardar medición</button></div>`;

  // historial
  if(hist.length){
    html+=`<div class="section-h">Historial (${hist.length})</div><div class="card pad0" style="padding:13px">`;
    hist.slice().reverse().forEach(e=>{
      html+=`<div class="row between" style="padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-weight:600;font-size:.86rem">${fmtDate(e.date)}</span>
        <span class="muted" style="font-size:.8rem">${e.m.peso?e.m.peso+'kg · ':''}Abd ${e.m.abdomen??'—'} · Pecho ${e.m.pecho??'—'}</span></div>`;
    });
    html+=`</div>`;
  }
  el.innerHTML=html;
}
function fmtDate(iso){ const [y,m,d]=iso.split('-'); return `${d}/${m}`; }

/* =================================================================
   RENDER: TOOLS
   ================================================================= */
function renderTools(){
  const el=document.getElementById('v-tools');
  let html=`<h2 class="title">Herramientas</h2>`;

  // Guías de corrida
  html+=`<div class="section-h">🏃 Guías de corrida (paso a paso)</div><div class="card">
    <div class="muted" style="font-size:.82rem;margin-bottom:11px">Tocá una corrida y la app te lleva fase por fase: te avisa <b>cuándo cambiar</b> (vibra y suena) y <b>a qué pulso</b> ir. Las zonas son <b style="color:var(--lime)">pulso, no velocidad</b>.</div>`;
  ['R1','R2','R3'].forEach(id=>{ const r=RUNS[id];
    html+=`<button class="btn btn-ghost btn-block" style="justify-content:space-between;margin-bottom:8px" onclick="RunPlayer.open('${id}')"><span>▶ ${r.name}</span><span class="muted" style="font-size:.74rem">${r.tot}</span></button>`; });
  html+=appleWatchTipHTML()+`</div>`;

  // FCmax
  html+=`<div class="section-h">❤️ Calculadora FCmáx + Zonas</div>
    <div class="card"><div class="row" style="gap:10px;align-items:flex-end">
      <div style="flex:1"><label class="fld">Edad</label><input type="number" id="fcAge" value="${PERFIL.edad}" onchange="recalcFC(this.value)"></div>
      <div style="text-align:center;flex:1"><div class="muted" style="font-size:.72rem">FCmáx (Tanaka)</div><div class="big" style="font-size:2rem;color:var(--lime)" id="fcOut">${PERFIL.fcmax}</div><div class="muted" style="font-size:.7rem">bpm</div></div>
    </div><div id="zonesOut" style="margin-top:14px"></div></div>`;

  // 1RM
  html+=`<div class="section-h">🏋️ Calculadora de 1RM y cargas</div>
    <div class="card"><div class="row" style="gap:10px">
      <div style="flex:1"><label class="fld">Peso usado (kg)</label><input type="number" inputmode="decimal" id="rmW" placeholder="ej. 20"></div>
      <div style="flex:1"><label class="fld">Reps máximas</label><input type="number" inputmode="numeric" id="rmR" placeholder="ej. 10"></div>
    </div>
    <button class="btn btn-lime btn-block" style="margin-top:12px" onclick="calcRM()">Calcular</button>
    <div id="rmOut" style="margin-top:12px"></div>
    <div class="muted" style="font-size:.74rem;margin-top:8px">Fórmula de Epley. Usa cargas que te permitan entre 6 y 12 reps para mayor precisión.</div></div>`;

  // referencia zonas
  html+=`<div class="section-h">📖 Referencia: zonas de esfuerzo</div><div class="card">`;
  ZONAS.forEach(z=> html+=`<div class="zone"><span class="dot" style="background:${z.color}"></span>
    <span class="zn" style="color:${z.color}">${z.z}</span>
    <span class="zd">${z.label} · ${z.desc}</span><span class="bpm">${z.pct[0]}-${z.pct[1]}%</span></div>`);
  html+=`<div class="muted" style="font-size:.74rem;margin-top:6px">Sin pulsómetro, guíate por la respiración: en Z3 conversas con dificultad; en Z4 casi no puedes hablar.</div></div>`;

  // info plan
  html+=`<div class="section-h">ℹ️ Sobre tu plan</div><div class="card"><div class="muted" style="font-size:.83rem;line-height:1.6">
    <b style="color:var(--text)">Perfil:</b> Hombre, 33 años, "falso magro" · objetivo: bajar grasa + recomposición.<br>
    <b style="color:var(--text)">Corrida:</b> 5KM Iniciante Nível 3 (mejorar tiempo, velocidad y resistencia).<br>
    <b style="color:var(--text)">Fuerza:</b> 5 entrenos/semana (A-E).<br>
    <b style="color:var(--text)">Fuente:</b> Time Híbrido · Victor Pareto · resp. técnico CREF-SC 025279.</div></div>`;

  el.innerHTML=html;
  renderZones();
}
function renderZones(){
  const out=document.getElementById('zonesOut'); if(!out) return;
  let h='';
  ZONAS.forEach(z=> h+=`<div class="zone"><span class="dot" style="background:${z.color}"></span>
    <span class="zn" style="color:${z.color}">${z.z}</span><span class="zd">${z.label}</span>
    <span class="bpm">${bpm(z.pct[0])}-${bpm(z.pct[1])}</span></div>`);
  out.innerHTML=h;
}
function recalcFC(age){ age=parseInt(age)||33; PERFIL.edad=age; PERFIL.fcmax=Math.round(208-0.7*age); document.getElementById('fcOut').textContent=PERFIL.fcmax; renderZones(); }
function calcRM(){
  const w=parseFloat(document.getElementById('rmW').value), r=parseInt(document.getElementById('rmR').value);
  const out=document.getElementById('rmOut');
  if(!w||!r){ out.innerHTML='<div class="notice">Ingresa peso y reps.</div>'; return; }
  const rm = w*(1+r/30); // Epley
  const pcts=[[100,1],[90,'~3-4'],[80,'~8'],[75,'~10'],[70,'~12'],[65,'~15']];
  let rows=pcts.map(p=>`<div class="row between" style="padding:5px 0;border-bottom:1px solid var(--border)"><span class="muted" style="font-size:.8rem">${p[0]}% · ${p[1]} reps</span><b>${(rm*p[0]/100).toFixed(1)} kg</b></div>`).join('');
  out.innerHTML=`<div class="flat"><div class="row between"><span>1RM estimado</span><b style="color:var(--lime);font-size:1.1rem">${rm.toFixed(1)} kg</b></div>
    <hr class="sep">${rows}</div>`;
}

/* =================================================================
   ACCIONES
   ================================================================= */
function startChallenge(){ S.startDate=todayISO(); save(); toast('¡Día 1 arrancado! 🐊'); renderAll(); }
function newWeek(){
  if(!confirm('¿Reiniciar la semana? Las sesiones vuelven a su día y se marca todo como pendiente. Tus medidas y cargas se conservan.')) return;
  SESSIONS.forEach(se=> S.sessions[se.id]={done:false, day:se.dayDef});
  S.startDate=todayISO(); save(); toast('Nueva semana lista 🔄'); go('hoy');
}
function completeSession(id){
  const st=S.sessions[id]; st.done=!st.done; save();
  // marcar habit del día como activo (para streak)
  const iso=todayISO(); habit(iso); save();
  S.streak=computeStreak();
  if(st.done) toast('✓ Sesión completada');
  renderAll();
}
function moveSession(id){
  const st=S.sessions[id];
  if(st.day>=7){ toast('Ya está en el último día'); return; }
  st.day++; save(); toast('Movida al Día '+st.day+' →'); renderAll();
}
function toggleMeal(k){ const h=habit(todayISO()); h[k]=!h[k]; save(); S.streak=computeStreak(); renderHoy(); document.getElementById('streakN').textContent=S.streak; }
function setWater(n){ const h=habit(todayISO()); h.water = (h.water===n)?n-1:n; save(); S.streak=computeStreak(); renderHoy(); document.getElementById('streakN').textContent=S.streak; }
function toggleRitual(period,i){
  const h=habit(todayISO()); const arr=h[period];
  const idx=arr.indexOf(i); if(idx>=0)arr.splice(idx,1); else arr.push(i);
  save(); S.streak=computeStreak(); renderHoy(); document.getElementById('streakN').textContent=S.streak;
}
function saveMeasure(){
  const date=document.getElementById('mDate').value || todayISO();
  const m={};
  METRICS.forEach(mt=>{ const v=document.getElementById('m_'+mt.k).value; if(v!=='') m[mt.k]=parseFloat(v); });
  if(Object.keys(m).length===0){ toast('Ingresa al menos una medida'); return; }
  // si ya existe esa fecha, reemplaza
  const existing=S.measures.find(e=>e.date===date);
  if(existing) existing.m={...existing.m,...m};
  else S.measures.push({date, m});
  save(); toast('📏 Medición guardada'); renderMedidas();
}
function openGym(id){ gymOpen=id; go('gym'); }

/* =================================================================
   NAV
   ================================================================= */
function go(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.v===v));
  window.scrollTo(0,0);
  if(v==='hoy')renderHoy(); if(v==='semana')renderSemana(); if(v==='gym')renderGym();
  if(v==='comida')renderComida(); if(v==='medidas')renderMedidas(); if(v==='tools')renderTools();
}
document.querySelectorAll('nav button').forEach(b=> b.onclick=()=>go(b.dataset.v));

function renderAll(){
  S.streak=computeStreak(); document.getElementById('streakN').textContent=S.streak;
  const active=document.querySelector('nav button.active').dataset.v;
  go(active);
}

/* INIT */
S.streak=computeStreak(); document.getElementById('streakN').textContent=S.streak;
renderHoy();
</script>
